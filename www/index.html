<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Retro Gaming</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #050a12;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background-color: #0b1426;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
      border: 1px solid #38bdf8;
      width: 320px;
      text-align: center;
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #94a3b8;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #1e293b;
      background-color: #0f172a;
      color: #fff;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #38bdf8;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #38bdf8;
      color: #050a12;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #0ea5e9;
    }

    .error-message {
      color: #ef4444;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }

    .forgot-link {
      margin-top: 15px;
      font-size: 14px;
    }

    .forgot-link a {
      color: #38bdf8;
      text-decoration: none;
      cursor: pointer;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }

    .admin-message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      background-color: #111827;
      border: 1px solid #38bdf8;
      color: #cbd5e1;
      font-size: 14px;
      display: none;
      text-align: left;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>RETRO GAMING</h2>

    <form id="loginForm" onsubmit="validarLogin(event)">
      <div class="input-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" required autocomplete="off">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit">Iniciar Sesión</button>

      <div id="errorMsg" class="error-message">
        Usuario o contraseña incorrectos
      </div>
    </form>

    <div class="forgot-link">
      <a onclick="mostrarMensajeAdmin()">¿Olvidaste tu contraseña?</a>
    </div>

    <div id="adminMsg" class="admin-message">
      Para cambiar la contraseña, comunícate con el administrador del proyecto.
    </div>
  </div>

  <script>
    function validarLogin(event) {
      event.preventDefault();

      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      if (user === "usuario" && pass === "retro2026") {
        sessionStorage.setItem("retroLogin", "true");
        errorMsg.style.display = "none";
        window.location.href = "menu.html";
      } else {
        errorMsg.style.display = "block";
      }
    }

    function mostrarMensajeAdmin() {
      const adminMsg = document.getElementById("adminMsg");
      adminMsg.style.display = "block";
    }
  </script>

</body>
</html>
