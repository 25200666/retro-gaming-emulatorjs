<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Retro Gaming Emulator</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        h2 { margin-bottom: 24px; color: #00adb5; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 5px;
            background: #2d2d2d;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00adb5;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #007a80; }
        .forgot-pass {
            display: block;
            margin-top: 15px;
            color: #a9a9a9;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
        .forgot-pass:hover { color: #00adb5; text-decoration: underline; }
        .error { color: #ff4444; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>EmuJS Login</h2>
    <input type="text" id="username" placeholder="Usuario (Código)">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="validarLogin()">Ingresar</button>
    <a class="forgot-pass" onclick="recuperarContrasena()">¿Olvidaste tu contraseña?</a>
    <div id="error-msg" class="error">Usuario o contraseña incorrectos</div>
</div>

<script>
    function validarLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Credenciales oficiales para la sustentación
        if (user === "25200666" && pass === "retro2026") {
            window.location.href = "play.html?core=nes&name=Super%20Mario%20Bros&rom=https://vimm.net/rom/download/5574";
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function recuperarContrasena() {
        alert("Para restablecer tu acceso, contacta al administrador del sistema o revisa la documentación del proyecto.");
    }
</script>

</body>
</html>
